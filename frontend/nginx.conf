server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Login gate for the whole dashboard (and its /api proxy). Credentials live
    # in .htpasswd, which is built into the image (see Dockerfile) and gitignored.
    auth_basic "Zesty Prism";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
