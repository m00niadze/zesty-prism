version: "3.9"

services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - db_data:/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  bot:
    build: ./bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - db_data:/data
    expose:
      - "8001"
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db_data:
